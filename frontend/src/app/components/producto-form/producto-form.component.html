<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white">
        <h5>{{ id ? 'Editar Producto' : 'Nuevo Producto' }}</h5>
      </div>
      <div class="card-body">
        
        <div *ngIf="loading" class="text-center my-3">
          <div class="spinner-border text-primary" role="status"></div>
        </div>

        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

        <form [formGroup]="form" (ngSubmit)="guardar()" *ngIf="!loading">
          
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Nombre *</label>
              <input type="text" class="form-control" formControlName="nombre" [class.is-invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched">
              <div class="invalid-feedback">El nombre es obligatorio.</div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Marca</label>
              <input type="text" class="form-control" formControlName="marca">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-4">
              <label class="form-label">Categoría</label>
              <input type="text" class="form-control" formControlName="categoria">
            </div>
            <div class="col-md-4">
              <label class="form-label">Precio *</label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" step="0.01" class="form-control" formControlName="precio" [class.is-invalid]="form.get('precio')?.invalid && form.get('precio')?.touched">
                <div class="invalid-feedback">Precio requerido (> 0).</div>
              </div>
            </div>
            <div class="col-md-4">
              <label class="form-label">Existencias *</label>
              <input type="number" class="form-control" formControlName="existencias" [class.is-invalid]="form.get('existencias')?.invalid && form.get('existencias')?.touched">
              <div class="invalid-feedback" *ngIf="!id">Existencias requeridas (>= 0).</div>
              <small class="text-muted" *ngIf="id">Use Ajuste para modificar existencias.</small>
            </div>
          </div>

          <div class="d-flex justify-content-end">
            <a routerLink="/productos" class="btn btn-secondary me-2">Cancelar</a>
            <button type="submit" class="btn btn-primary" [disabled]="saving">
              <i class="fas fa-save" *ngIf="!saving"></i>
              <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true" *ngIf="saving"></span>
              {{ saving ? 'Guardando...' : 'Guardar' }}
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
